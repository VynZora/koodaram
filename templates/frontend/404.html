{% extends 'frontend/base.html' %}
{% load static %}

{% block title %}Page Not Found | Koodaram{% endblock %}
{% block meta_description %}Koodaram Page Not Found page.{% endblock %}

{% block content %}

<style>
    header,
    footer {
        display: none !important;
    }
    </style>
    <!-- error Page start -->
    <div class="error-page">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="error-page-image wow fadeInUp">
                        <img src="{% static 'images/404-error-img.png' %}" alt="">
                    </div>
                    <div class="error-page-content">
                        <div class="section-title">
                            <h2 class="text-anime-style-3" data-cursor="-opaque">Oops! page not found</h2>
                        </div>
                        <div class="error-page-content-body">
                            <p class="wow fadeInUp" data-wow-delay="0.2s">The page you are looking for does not exist.</p>
                            <a class="btn-default wow fadeInUp" data-wow-delay="0.4s" href="{% url 'home' %}">back to home</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- error Page end -->

   
{% endblock %}
